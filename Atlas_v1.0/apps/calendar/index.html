<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Calendar · Atlas</title>
<link rel="stylesheet" href="css/main.css">
<style>
:root{--blue:#2563eb;--blue-l:#dbeafe;--bg:#f5f5f7;--surface:#fff;--border:#e5e5ea;--text:#111113;--text2:#4b4b53;--text3:#86868b;--font:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:8px}
#__subapp-back__{display:none!important}
.shell{display:grid;grid-template-columns:1fr 270px;height:100%;overflow:hidden}
/* Grid area */
.cal-main{display:flex;flex-direction:column;padding:18px 18px 18px 20px;overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.cal-nav-row{display:flex;align-items:center;gap:6px}
.cal-nav{padding:5px 10px;border-radius:6px;font-size:14px;color:var(--text2);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-nav:hover{background:#f0f0f2}
.cal-day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-lbl{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:3px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex:1;min-height:0}
.cal-cell{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:6px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;min-height:70px;transition:border-color .12s,background .12s}
.cal-cell:hover{border-color:#aaa;background:#fafafa}
.cal-cell.today{border-color:var(--blue);border-width:2px;background:#eff6ff}
.cal-cell.today .cal-day-num{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;margin:-1px 0 3px}
.cal-cell.selected{background:var(--blue-l);border-color:var(--blue)}
.cal-cell.other{opacity:.28;pointer-events:none}
.cal-day-num{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.cal-ev-chip{font-size:10px;padding:2px 5px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;border-left:2px solid}
/* Sidebar */
.cal-sidebar{display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);padding:16px;overflow-y:auto;gap:12px}
.cal-sb-date{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.cal-sb-hint{font-size:12px;color:var(--text3)}
.cal-ev-list{display:flex;flex-direction:column;gap:7px}
.cal-ev-item{border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:7px 9px;background:#f8f8fa}
.cal-ev-title{font-size:13px;font-weight:600;color:var(--text)}
.cal-ev-time{font-size:11.5px;color:var(--text3);margin-top:2px}
.cal-ev-cat{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:10px;background:#e5e5ea;color:var(--text2);margin-top:3px}
.cal-ev-del{font-size:11px;color:#e0245e;cursor:pointer;margin-top:4px;display:block;background:none;border:none;padding:0;font-family:inherit}
.cal-ev-del:hover{text-decoration:underline}
.cal-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1.5px dashed var(--border);border-radius:7px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;width:100%;transition:border-color .12s,color .12s,background .12s}
.cal-add-btn:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
.cal-add-form{background:#f8f8fa;border:1px solid var(--border);border-radius:9px;padding:13px;display:flex;flex-direction:column;gap:9px}
.cal-add-form-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px}
.cal-form-field{display:flex;flex-direction:column;gap:3px}
.cal-form-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.cal-form-inp{padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);outline:none;width:100%;transition:border-color .15s;font-size:13px}
.cal-form-inp:focus{border-color:var(--blue)}
textarea.cal-form-inp{resize:vertical}
.cal-form-actions{display:flex;gap:7px}
.cal-form-save{flex:1;padding:8px;background:var(--blue);color:#fff;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .12s;font-family:inherit}
.cal-form-save:hover{background:#1d4ed8}
.cal-form-cancel{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text2);background:#fff;cursor:pointer;font-family:inherit}
.cal-form-cancel:hover{background:#f0f0f2}
.cal-upcoming-sec{margin-top:4px}
.cal-upcoming-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px}
.cal-upcoming-row{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.cal-upcoming-row:last-child{border:none}
.cal-upcoming-title{font-weight:600;color:var(--text)}
.cal-upcoming-when{color:var(--text3);margin-top:1px}
</style>
</head>
<body>
<div class="shell">
  <!-- Grid -->
  <div class="cal-main">
    <div class="cal-header">
      <div class="cal-title" id="calTitle">May 2026</div>
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="prevMonth()">‹</button>
        <button class="cal-nav" onclick="goToday()">Today</button>
        <button class="cal-nav" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="cal-day-labels" id="calDayLabels"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Sidebar -->
  <aside class="cal-sidebar">
    <div class="cal-sb-date" id="calSbDate">Select a day</div>
    <div class="cal-sb-hint" id="calSbHint">Click any day to see events</div>
    <div class="cal-ev-list" id="calEvList"></div>

    <button class="cal-add-btn" id="calAddBtn" onclick="showAddForm()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
      Add Event
    </button>

    <div id="calAddForm" style="display:none" class="cal-add-form">
      <div class="cal-add-form-title">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
        New Event
      </div>
      <div class="cal-form-field">
        <label class="cal-form-lbl">Title</label>
        <input id="cfTitle" class="cal-form-inp" placeholder="Event name…">
      </div>
      <div class="cal-form-field">
        <label class="cal-form-lbl">Time</label>
        <input id="cfTime" class="cal-form-inp" type="time" value="09:00">
      </div>
      <div class="cal-form-field">
        <label class="cal-form-lbl">Category</label>
        <select id="cfCat" class="cal-form-inp">
          <option value="Work" data-color="#3b82f6">Work</option>
          <option value="Finance" data-color="#22c55e">Finance</option>
          <option value="Bills" data-color="#ef4444">Bills</option>
          <option value="Health" data-color="#a855f7">Health</option>
          <option value="Personal" data-color="#f59e0b">Personal</option>
          <option value="Product Drop" data-color="#ef4444">Product Drop</option>
        </select>
      </div>
      <div class="cal-form-actions">
        <button class="cal-form-save" onclick="saveEvent()">Save</button>
        <button class="cal-form-cancel" onclick="hideAddForm()">Cancel</button>
      </div>
    </div>

    <div class="cal-upcoming-sec">
      <div class="cal-upcoming-lbl">This Month</div>
      <div id="calUpcoming"></div>
    </div>
  </aside>
</div>

<script>
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAT_COLORS={Work:'#3b82f6',Finance:'#22c55e',Bills:'#ef4444',Health:'#a855f7',Personal:'#f59e0b','Product Drop':'#ef4444'};
const EVENTS_KEY='superapp_calendar_events';
const today=new Date();
let viewMonth=today.getMonth();
let viewYear=today.getFullYear();
let selectedDay=null;

function loadEvents(){try{return JSON.parse(localStorage.getItem(EVENTS_KEY)||'[]');}catch(e){return[];}}
function saveEvents(evts){localStorage.setItem(EVENTS_KEY,JSON.stringify(evts));}

function render(){
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const prevMonthDays=new Date(viewYear,viewMonth,0).getDate();
  const events=loadEvents();

  document.getElementById('calTitle').textContent=MONTHS[viewMonth]+' '+viewYear;
  document.getElementById('calDayLabels').innerHTML=DAYS.map(d=>'<div class="cal-day-lbl">'+d+'</div>').join('');

  const cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({day:prevMonthDays-i,cur:false});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true});
  while(cells.length<42) cells.push({day:cells.length-firstDay-daysInMonth+1,cur:false});

  document.getElementById('calGrid').innerHTML=cells.map(cell=>{
    const isToday=cell.cur&&cell.day===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
    const isSel=cell.cur&&selectedDay===cell.day;
    const cellEvts=cell.cur?events.filter(e=>e.day===cell.day&&e.month===viewMonth&&e.year===viewYear):[];
    const cls='cal-cell'+(isToday?' today':'')+(isSel?' selected':'')+(cell.cur?'':' other');
    const click=cell.cur?'onclick="selectDay('+cell.day+')"':'';
    return '<div class="'+cls+'" '+click+'>'
      +'<div class="cal-day-num">'+cell.day+'</div>'
      +cellEvts.slice(0,3).map(ev=>{
        const c=CAT_COLORS[ev.category]||'#2563eb';
        return '<div class="cal-ev-chip" style="background:'+c+'22;border-color:'+c+';color:'+c+'">'+ev.title+'</div>';
      }).join('')
      +'</div>';
  }).join('');

  renderSidebar();
  renderUpcoming();
}

function selectDay(day){
  selectedDay=day;
  render();
  hideAddForm();
}

function renderSidebar(){
  const dateEl=document.getElementById('calSbDate');
  const hintEl=document.getElementById('calSbHint');
  const listEl=document.getElementById('calEvList');
  const addBtn=document.getElementById('calAddBtn');

  if(selectedDay===null){
    dateEl.textContent='Select a day';
    hintEl.textContent='Click any day to see events';
    if(addBtn) addBtn.style.display='none';
    if(listEl) listEl.innerHTML='';
    return;
  }

  dateEl.textContent=MONTHS[viewMonth]+' '+selectedDay+', '+viewYear;
  hintEl.textContent='';
  if(addBtn) addBtn.style.display='';

  const events=loadEvents().filter(e=>e.day===selectedDay&&e.month===viewMonth&&e.year===viewYear);
  if(!listEl) return;
  if(events.length===0){
    listEl.innerHTML='<div style="font-size:12px;color:#86868b">No events — add one below.</div>';
  } else {
    listEl.innerHTML=events.map(ev=>{
      const c=CAT_COLORS[ev.category]||'#2563eb';
      return '<div class="cal-ev-item" style="border-left-color:'+c+'">'
        +'<div class="cal-ev-title">'+ev.title+'</div>'
        +'<div class="cal-ev-time">'+ev.time+'</div>'
        +(ev.category?'<div class="cal-ev-cat">'+ev.category+'</div>':'')
        +'<button class="cal-ev-del" onclick="deleteEvent('+ev.id+')">Delete</button>'
        +'</div>';
    }).join('');
  }
}

function renderUpcoming(){
  const events=loadEvents().filter(e=>e.month===viewMonth&&e.year===viewYear).sort((a,b)=>a.day-b.day);
  const el=document.getElementById('calUpcoming');
  if(!el) return;
  el.innerHTML=events.slice(0,6).map(ev=>'<div class="cal-upcoming-row"><div class="cal-upcoming-title">'+ev.title+'</div><div class="cal-upcoming-when">'+MONTHS[viewMonth].slice(0,3)+' '+ev.day+' · '+ev.time+'</div></div>').join('')
    ||'<div style="font-size:12px;color:#86868b">No events this month</div>';
}

window.prevMonth=function(){if(viewMonth===0){viewMonth=11;viewYear--;}else viewMonth--;selectedDay=null;render();};
window.nextMonth=function(){if(viewMonth===11){viewMonth=0;viewYear++;}else viewMonth++;selectedDay=null;render();};
window.goToday=function(){viewMonth=today.getMonth();viewYear=today.getFullYear();selectedDay=today.getDate();render();};
window.showAddForm=function(){document.getElementById('calAddForm').style.display='';document.getElementById('calAddBtn').style.display='none';setTimeout(()=>{const t=document.getElementById('cfTitle');if(t)t.focus();},50);};
window.hideAddForm=function(){document.getElementById('calAddForm').style.display='none';if(selectedDay!==null)document.getElementById('calAddBtn').style.display='';};

window.saveEvent=function(){
  const title=document.getElementById('cfTitle').value.trim();
  const time=document.getElementById('cfTime').value||'09:00';
  const cat=document.getElementById('cfCat').value;
  if(!title){alert('Enter an event title.');return;}
  if(selectedDay===null){alert('Select a day first.');return;}
  const events=loadEvents();
  events.push({id:Date.now(),title,time,category:cat,day:selectedDay,month:viewMonth,year:viewYear,color:CAT_COLORS[cat]||'#2563eb'});
  saveEvents(events);
  document.getElementById('cfTitle').value='';
  hideAddForm();
  render();
};

window.deleteEvent=function(id){
  const events=loadEvents().filter(e=>e.id!==id);
  saveEvents(events);
  render();
};

window.addEventListener('DOMContentLoaded',function(){render();goToday();});
</script>
</body>
</html>
